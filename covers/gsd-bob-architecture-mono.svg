<svg viewBox="0 0 960 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="ui-monospace, 'JetBrains Mono', 'Roboto Mono', 'SFMono-Regular', Menlo, monospace">
  <title id="t">gsd-bob architecture — tactical HUD (monochrome)</title>
  <desc id="d">Monochrome dark tactical schematic over a faint Saturn-hexagon, Earth-globe and Metatron-cube sigil: gsd-core Claude sources transform through the bob adapter into Bob-native artifacts, gated to 28 emitted and 2 withheld skills, and mapped as a six-artifact upstream move into gsd-core 1.6.1.</desc>
  <defs>
    <pattern id="grid32" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#a9b6ba" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <pattern id="grid96" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M96 0H0V96" fill="none" stroke="#a9b6ba" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#c2cccf"/>
    </marker>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ink{fill:#f2f6f7;} .dim{fill:#a6b1b6;} .aq{fill:#c2cccf;} .mg{fill:#ffffff;}
      .lbl{fill:#c3ccd0;letter-spacing:0.14em;} .b{font-weight:700;}
      .cell{fill:#0c0f13;stroke:#ffffff;stroke-opacity:0.20;stroke-width:1;}
      .rule{stroke:#ffffff;stroke-opacity:0.14;}
      .brk{fill:none;stroke:#c2cccf;stroke-width:1.4;}
      .brkm{fill:none;stroke:#ffffff;stroke-width:1.4;}
      .arw{stroke:#c2cccf;stroke-width:2;fill:none;}
      .g{filter:url(#glow);}
    </style>
  </defs>

  <!-- base -->
  <rect x="0" y="0" width="960" height="920" fill="#060709"/>
  <rect x="0" y="0" width="960" height="920" fill="url(#grid32)"/>
  <rect x="0" y="0" width="960" height="920" fill="url(#grid96)"/>

  <!-- ===== SIGIL: Saturn hexagon · Earth globe · Metatron cube ===== -->
  <g fill="none" stroke="#b8c2c6">
    <g stroke-opacity="0.05">
      <circle cx="480" cy="448" r="330"/>
      <ellipse cx="480" cy="448" rx="110" ry="330"/>
      <ellipse cx="480" cy="448" rx="220" ry="330"/>
      <line x1="480" y1="118" x2="480" y2="778"/>
      <line x1="150" y1="448" x2="810" y2="448"/>
      <line x1="169" y1="338" x2="791" y2="338"/>
      <line x1="169" y1="558" x2="791" y2="558"/>
      <line x1="234" y1="228" x2="726" y2="228"/>
      <line x1="234" y1="668" x2="726" y2="668"/>
    </g>
    <g stroke-opacity="0.06" transform="rotate(-18 480 448)">
      <ellipse cx="480" cy="448" rx="360" ry="96"/>
      <ellipse cx="480" cy="448" rx="315" ry="82"/>
    </g>
    <path stroke-opacity="0.09" d="M480 118 L765.8 283 L765.8 613 L480 778 L194.2 613 L194.2 283 Z"/>
    <g stroke-opacity="0.06">
      <path d="M480 238 L298.1 553 L661.9 553 Z"/>
      <path d="M298.1 343 L480 658 L661.9 343 Z"/>
    </g>
    <g stroke-opacity="0.12" class="g">
      <path d="M480 288 L618.6 368 L618.6 528 L480 608 L341.4 528 L341.4 368 Z"/>
      <line x1="480" y1="448" x2="480" y2="288"/>
      <line x1="480" y1="448" x2="341.4" y2="528"/>
      <line x1="480" y1="448" x2="618.6" y2="528"/>
    </g>
  </g>

  <!-- ===== HEADER ===== -->
  <text x="40" y="36" class="dim" font-size="11" letter-spacing="2">// FIELD SYSTEMS // GLOBAL</text>
  <text x="40" y="80" class="ink b" font-size="27" letter-spacing="2">GSD-BOB</text>
  <text x="40" y="100" class="dim" font-size="12">GSD spec-driven planning, deployed to IBM Bob</text>

  <rect x="560" y="26" width="360" height="34" class="cell" stroke="#c2cccf" stroke-opacity="0.35"/>
  <text x="740" y="48" text-anchor="middle" class="aq g" font-size="12">npx @zack-maz/gsd-bob --bob --local</text>
  <text x="920" y="82" text-anchor="end" class="dim" font-size="11" letter-spacing="1">SYS <tspan class="aq">▪ OPERATIONAL</tspan>   ·   LICENSE MIT   ·   OPEN-SOURCE</text>

  <line class="rule" x1="16" y1="112" x2="944" y2="112"/>

  <!-- ===== PIPELINE ===== -->
  <text x="40" y="140" class="lbl" font-size="11">PIPELINE // ONE INSTALL — SOURCE ▸ TRANSFORM ▸ EMIT</text>

  <!-- Stage 1 -->
  <rect class="cell" x="40" y="152" width="277" height="248"/>
  <line class="g" x1="40" y1="152" x2="317" y2="152" stroke="#c2cccf" stroke-width="2"/>
  <path class="brk" d="M40 164 V152 H52 M305 152 H317 V164 M40 388 V400 H52 M305 400 H317 V388"/>
  <text x="58" y="180" class="aq g" font-size="11" letter-spacing="1.5">01 // SOURCE</text>
  <text x="58" y="204" class="ink b" font-size="15.5">Canonical Claude cmds</text>
  <line class="rule" x1="58" y1="216" x2="299" y2="216"/>
  <text x="58" y="240" class="dim" font-size="11.5">agents/*.md</text>
  <text x="58" y="262" class="dim" font-size="11.5">commands/gsd/*.md</text>
  <text x="58" y="292" class="dim" font-size="12">Frontmatter: name,</text>
  <text x="58" y="310" class="dim" font-size="12">description, tools —</text>
  <text x="58" y="328" class="dim" font-size="12">runtime-neutral truth.</text>
  <text x="58" y="360" class="ink" font-size="12">GSD command set drives</text>
  <text x="58" y="378" class="ink" font-size="12">the full phase loop.</text>

  <!-- Stage 2 (net-new) -->
  <rect class="cell" x="341" y="152" width="277" height="248" stroke="#ffffff" stroke-opacity="0.4"/>
  <line class="g" x1="341" y1="152" x2="618" y2="152" stroke="#ffffff" stroke-width="2"/>
  <path class="brkm" d="M341 164 V152 H353 M606 152 H618 V164 M341 388 V400 H353 M606 400 H618 V388"/>
  <text x="359" y="180" class="mg g" font-size="11" letter-spacing="1.5">02 // TRANSFORM — NET-NEW</text>
  <text x="359" y="204" class="ink b" font-size="15.5">bob-adapter.cjs</text>
  <line class="rule" x1="359" y1="216" x2="600" y2="216"/>
  <text x="359" y="240" class="ink" font-size="11">convertClaudeCmdToBobCommand()</text>
  <text x="359" y="261" class="ink" font-size="11">convertClaudeCmdToBobSkill()</text>
  <text x="359" y="282" class="ink" font-size="11">gateArtifact()</text>
  <text x="359" y="303" class="ink" font-size="11">mergeCustomModes()</text>
  <text x="359" y="324" class="ink" font-size="11">buildSupportRoster()</text>
  <line class="rule" x1="359" y1="340" x2="600" y2="340"/>
  <text x="359" y="364" class="mg b g" font-size="12">0 MODEL-BRAND LITERALS</text>
  <text x="359" y="382" class="dim" font-size="11.5">enforced at build time.</text>

  <!-- Stage 3 -->
  <rect class="cell" x="642" y="152" width="278" height="248"/>
  <line class="g" x1="642" y1="152" x2="920" y2="152" stroke="#c2cccf" stroke-width="2"/>
  <path class="brk" d="M642 164 V152 H654 M908 152 H920 V164 M642 388 V400 H654 M908 400 H920 V388"/>
  <text x="660" y="180" class="aq g" font-size="11" letter-spacing="1.5">03 // EMIT</text>
  <text x="660" y="204" class="ink b" font-size="15.5">Bob-native artifacts</text>
  <line class="rule" x1="660" y1="216" x2="902" y2="216"/>
  <text x="660" y="240" class="dim" font-size="11">.bob/commands/gsd-*.md</text>
  <text x="660" y="261" class="dim" font-size="11">.bob/skills/gsd-*/SKILL.md</text>
  <line class="rule" x1="660" y1="276" x2="902" y2="276"/>
  <text x="660" y="300" class="ink" font-size="12">Seeds .planning/config.json</text>
  <text x="660" y="320" class="dim" font-size="11">context_window: 270000</text>
  <text x="660" y="340" class="dim" font-size="11.5">text_mode → numbered</text>
  <text x="660" y="370" class="aq b g" font-size="12.5">▸ .planning/ artifacts</text>
  <text x="660" y="388" class="dim" font-size="11.5">identical to every runtime.</text>

  <path class="arw g" d="M319 276 L339 276" marker-end="url(#a)"/>
  <path class="arw g" d="M620 276 L640 276" marker-end="url(#a)"/>

  <line class="rule" x1="16" y1="424" x2="944" y2="424"/>

  <!-- ===== CAPABILITY ===== -->
  <text x="40" y="452" class="lbl" font-size="11">CAPABILITY GATE // GENERATED ROSTER</text>
  <rect class="cell" x="40" y="462" width="880" height="180" fill="#080a0c"/>
  <path class="brk" d="M40 474 V462 H52 M908 462 H920 V474 M40 630 V642 H52 M908 642 H920 V630"/>
  <text x="60" y="492" class="ink b" font-size="16">28 EMITTED</text>
  <text x="196" y="492" class="dim" font-size="16">·</text>
  <text x="212" y="492" class="dim b" font-size="16">2 WITHHELD</text>

  <!-- supported chips -->
  <g>
    <rect class="cell" x="60" y="506" width="156" height="44"/>
    <rect class="aq" x="72" y="521" width="8" height="8"/>
    <text x="90" y="532" class="ink" font-size="12">Core loop</text>
    <text x="204" y="534" text-anchor="end" class="aq b g" font-size="18">6</text>

    <rect class="cell" x="226" y="506" width="156" height="44"/>
    <rect class="aq" x="238" y="521" width="8" height="8"/>
    <text x="256" y="532" class="ink" font-size="12">Quality gates</text>
    <text x="370" y="534" text-anchor="end" class="aq b g" font-size="18">5</text>

    <rect class="cell" x="392" y="506" width="156" height="44"/>
    <rect class="aq" x="404" y="521" width="8" height="8"/>
    <text x="422" y="532" class="ink" font-size="12">Milestone</text>
    <text x="536" y="534" text-anchor="end" class="aq b g" font-size="18">4</text>

    <rect class="cell" x="558" y="506" width="156" height="44"/>
    <rect class="aq" x="570" y="521" width="8" height="8"/>
    <text x="588" y="532" class="ink" font-size="12">Planning aids</text>
    <text x="702" y="534" text-anchor="end" class="aq b g" font-size="18">6</text>

    <rect class="cell" x="724" y="506" width="176" height="44"/>
    <rect class="aq" x="736" y="521" width="8" height="8"/>
    <text x="754" y="532" class="ink" font-size="12">Context &amp; maint</text>
    <text x="888" y="534" text-anchor="end" class="aq b g" font-size="18">7</text>
  </g>

  <!-- withheld chips -->
  <g>
    <rect class="cell" x="60" y="562" width="410" height="46"/>
    <rect x="72" y="577" width="8" height="8" fill="none" stroke="#a6b1b6" stroke-width="1.3"/>
    <text x="90" y="582" class="dim b" font-size="12.5">gsd-autonomous</text>
    <text x="330" y="582" class="dim" font-size="10" letter-spacing="1">// OFFLINE</text>
    <text x="90" y="599" class="dim" font-size="10.5">needs isolated subagents Bob lacks</text>

    <rect class="cell" x="490" y="562" width="410" height="46"/>
    <rect x="502" y="577" width="8" height="8" fill="none" stroke="#a6b1b6" stroke-width="1.3"/>
    <text x="520" y="582" class="dim b" font-size="12.5">gsd-parallel-fanout</text>
    <text x="770" y="582" class="dim" font-size="10" letter-spacing="1">// OFFLINE</text>
    <text x="520" y="599" class="dim" font-size="10.5">Bob runs subagents sequentially inline</text>
  </g>

  <line class="rule" x1="16" y1="668" x2="944" y2="668"/>

  <!-- ===== UPSTREAM ===== -->
  <text x="40" y="696" class="lbl" font-size="11">UPSTREAM MOVE ▸ GSD-CORE 1.6.1 // 4 OF 6 = PURE DATA</text>

  <g>
    <rect class="cell" x="40" y="708" width="136" height="112"/>
    <text x="54" y="732" class="aq b g" font-size="13">1</text>
    <text x="54" y="754" class="ink" font-size="11.5">registry entry</text>
    <text x="54" y="771" class="dim" font-size="9.5">capability-registry</text>
    <text x="54" y="806" class="dim b" font-size="9.5" letter-spacing="1">DATA</text>

    <rect class="cell" x="188" y="708" width="136" height="112"/>
    <text x="202" y="732" class="aq b g" font-size="13">2</text>
    <text x="202" y="754" class="ink" font-size="11.5">alias · manifest</text>
    <text x="202" y="771" class="dim" font-size="9.5">runtime-aliases</text>
    <text x="202" y="806" class="dim b" font-size="9.5" letter-spacing="1">DATA</text>

    <rect class="cell" x="336" y="708" width="136" height="112"/>
    <text x="350" y="732" class="aq b g" font-size="13">3</text>
    <text x="350" y="754" class="ink" font-size="11.5">alias · policy</text>
    <text x="350" y="771" class="dim" font-size="9.5">runtime-name-policy</text>
    <text x="350" y="806" class="dim b" font-size="9.5" letter-spacing="1">DATA</text>

    <rect class="cell" x="484" y="708" width="136" height="112"/>
    <text x="498" y="732" class="aq b g" font-size="13">4</text>
    <text x="498" y="754" class="ink" font-size="11.5">config-home</text>
    <text x="498" y="771" class="dim" font-size="9.5">dot-home resolver</text>
    <text x="498" y="806" class="dim b" font-size="9.5" letter-spacing="1">REUSED</text>

    <rect class="cell" x="632" y="708" width="136" height="112" stroke="#ffffff" stroke-opacity="0.45"/>
    <text x="646" y="732" class="mg b g" font-size="13">5</text>
    <text x="646" y="754" class="ink" font-size="11.5">converter pair</text>
    <text x="646" y="771" class="dim" font-size="9.5">~105-line rewrite</text>
    <text x="646" y="806" class="mg b" font-size="9.5" letter-spacing="1">NET-NEW</text>

    <rect class="cell" x="780" y="708" width="140" height="112" stroke="#ffffff" stroke-opacity="0.45"/>
    <text x="794" y="732" class="mg b g" font-size="13">6</text>
    <text x="794" y="754" class="ink" font-size="11.5">bob-adapter.cjs</text>
    <text x="794" y="771" class="dim" font-size="9.5">gate + merge</text>
    <text x="794" y="806" class="mg b" font-size="9.5" letter-spacing="1">NET-NEW</text>
  </g>

  <!-- ===== FOOTER ===== -->
  <line class="rule" x1="16" y1="846" x2="944" y2="846"/>
  <g font-size="11">
    <rect class="aq" x="40" y="866" width="11" height="11"/>
    <text x="58" y="875" class="dim">system / operational</text>
    <rect class="mg" x="220" y="866" width="11" height="11"/>
    <text x="238" y="875" class="dim">net-new logic authored</text>
    <rect x="420" y="866" width="11" height="11" fill="none" stroke="#a6b1b6" stroke-width="1.3"/>
    <text x="438" y="875" class="dim">withheld / offline</text>
  </g>
  <text x="920" y="875" text-anchor="end" class="dim" font-size="10" letter-spacing="1">BUILD v0.1.1 · GSD-CORE 1.6.1 · 104 COMMITS</text>
  <text x="40" y="906" class="dim" font-size="11.5" letter-spacing="0.5">IBM BOB OWNS MODEL ROUTING — THE ADAPTER STAYS BACKEND-AGNOSTIC BY CONTRACT.</text>
